[tool.ruff]
target-version = "py311"
line-length = 120
src = ["app", "tests", "tools"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501", "E701", "E702", "E741", "E402", "F811", "F841"]

[tool.ruff.lint.per-file-ignores]
"app/os/pdf_builder.py" = ["E402"]
"app/os/pdf_support.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
