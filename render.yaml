# Blueprint Render (opcional) — Web Service IRIS
services:
  - type: web
    name: iris-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: IRIS_PRODUCTION
        value: "1"
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
