<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRIS Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat+Alternates:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
  --bg:#f7fbff;
  --card:#ffffff;
  --text:#1c2940;
  --muted:#73839a;
  --line:#dce6f2;
  --blue:#158cff;
  --purple:#8f4cff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(21,140,255,.08), transparent 28%),
    radial-gradient(circle at bottom left, rgba(143,76,255,.08), transparent 30%),
    linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
  font-family:'Inter',sans-serif;
  color:var(--text);
}

body::before,
body::after{
  content:"";
  position:fixed;
  width:460px;
  height:460px;
  border-radius:999px;
  border:1px solid rgba(120,142,180,.08);
  pointer-events:none;
}

body::before{
  top:-180px;
  right:-120px;
  box-shadow:
    0 0 0 40px rgba(120,142,180,.03),
    0 0 0 90px rgba(120,142,180,.02),
    0 0 0 140px rgba(120,142,180,.015);
}

body::after{
  left:-220px;
  bottom:-220px;
  box-shadow:
    0 0 0 40px rgba(21,140,255,.03),
    0 0 0 90px rgba(21,140,255,.02),
    0 0 0 140px rgba(21,140,255,.015);
}

.page{
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:50px;
  position:relative;
  z-index:2;
}

.login-shell{
  width:min(1120px,100%);
  display:grid;
  grid-template-columns:1fr 480px;
  gap:70px;
  align-items:center;
}

.brand-side{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:24px;
  margin-bottom:30px;
}

.logo{
  width:108px;
  height:108px;
  border-radius:999px;
  border:4px solid rgba(65,145,255,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  box-shadow:0 18px 40px rgba(70,130,255,.14);
}

.logo::before{
  content:"";
  position:absolute;
  width:54px;
  height:54px;
  border-radius:999px;
  background:
  repeating-conic-gradient(
  from 0deg,
  rgba(72,145,255,.95) 0deg 4deg,
  transparent 4deg 14deg
  );
  mask:radial-gradient(circle,transparent 0 42%,#000 44% 68%,transparent 70%);
  animation:spin 16s linear infinite,
             breathe 8s ease-in-out infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@keyframes breathe{
  0%,100%{scale:.94}
  50%{scale:1.06}
}

.wordmark{
  font-family:'Montserrat Alternates',sans-serif;
  font-size:3.5rem;
  font-weight:300;
  letter-spacing:.32em;
  color:#1d2a3d;
}

.hero{
  font-family:'Montserrat Alternates',sans-serif;
  font-size:1rem;
  line-height:1.6;
  font-weight:500;
  color:#506178;
  max-width:280px;
  margin-left:132px;
}

.loader{
  width:340px;
  height:7px;
  border-radius:999px;
  background:rgba(213,223,236,.75);
  overflow:hidden;
  margin-top:28px;
  margin-left:132px;
  position:relative;
}

.loader::before{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  left:-40%;
  width:40%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  animation:loading 2.6s ease-in-out infinite;
}

@keyframes loading{
  0%{left:-40%}
  100%{left:100%}
}

.login-card{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(210,220,232,.7);
  border-radius:34px;
  padding:38px;
  backdrop-filter:blur(18px);
  box-shadow:0 28px 80px rgba(31,59,100,.10);
}

.login-top{
  margin-bottom:28px;
}

.login-top h1{
  font-size:1.8rem;
  font-weight:800;
  letter-spacing:-.04em;
  margin-bottom:8px;
}

.login-top p{
  color:var(--muted);
  font-size:.96rem;
  font-weight:500;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:.82rem;
  font-weight:800;
  color:#2a3950;
}

.input-wrap{
  position:relative;
}

.icon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:#90a0b5;
  font-size:1rem;
}

.toggle{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  color:#90a0b5;
  cursor:pointer;
}

.input-wrap input{
  width:100%;
  height:60px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fff;
  padding:0 52px;
  outline:none;
  font:inherit;
  font-size:.95rem;
  font-weight:600;
  color:#1c2940;
  transition:.2s ease;
}

.input-wrap input:focus{
  border-color:rgba(21,140,255,.58);
  box-shadow:0 0 0 5px rgba(21,140,255,.10);
}

.options{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:8px 0 24px;
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.8rem;
  font-weight:700;
  color:#44556b;
}

.remember input{
  accent-color:var(--blue);
}

.forgot{
  text-decoration:none;
  color:var(--blue);
  font-size:.8rem;
  font-weight:800;
}

.submit{
  width:100%;
  height:60px;
  border:none;
  border-radius:18px;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  color:white;
  font:inherit;
  font-size:1rem;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 18px 38px rgba(77,117,255,.18);
  transition:.2s ease;
}

.submit:hover{
  transform:translateY(-1px);
}

.footer{
  position:fixed;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  color:#91a0b6;
  font-size:.72rem;
  font-weight:600;
}

@media(max-width:1050px){

  html,body{
    overflow:auto;
  }

  .page{
    padding:36px 20px 70px;
  }

  .login-shell{
    grid-template-columns:1fr;
    gap:42px;
  }

  .brand-side{
    align-items:center;
    text-align:center;
  }

  .hero{
    margin-left:0;
  }

  .loader{
    margin-left:0;
  }

  .login-card{
    max-width:480px;
    width:100%;
    margin:auto;
  }
}

</style>
</head>

<body>

<main class="page">

<div class="login-shell">

<section class="brand-side">

<div class="brand">
<div class="logo"></div>
<div class="wordmark">IRIS</div>
</div>

<div class="hero">
Gestão técnica com clareza, campo e controle.
</div>

<div class="loader"></div>

</section>

<section class="login-card">

<div class="login-top">
<h1>Bem-vindo de volta</h1>
<p>Faça login para continuar</p>
</div>

<form method="post">

<div class="field">
<label>E-mail</label>

<div class="input-wrap">
<i class="bi bi-envelope icon"></i>
<input type="email" name="email" placeholder="voce@empresa.com">
</div>
</div>

<div class="field">
<label>Senha</label>

<div class="input-wrap">
<i class="bi bi-lock icon"></i>
<input id="senha" type="password" name="senha" placeholder="Sua senha">
<i class="bi bi-eye toggle" id="toggle"></i>
</div>
</div>

<div class="options">

<label class="remember">
<input type="checkbox">
Lembrar de mim
</label>

<a href="#" class="forgot">
Esqueci minha senha
</a>

</div>

<button class="submit">
Entrar
</button>

</form>

</section>

</div>

</main>

<div class="footer">
© 2026 IRIS. Todos os direitos reservados.
</div>

<script>
document.getElementById('toggle')?.addEventListener('click',()=>{
const input=document.getElementById('senha');
input.type=input.type==='password'?'text':'password';
});
</script>

</body>
</html>
