<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IRIS Campo - Carregando</title>

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="IRIS Campo">
<link rel="manifest" href="/static/campo_manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat+Alternates:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --text:#1d2a3d;
  --muted:#718097;
  --blue:#158cff;
  --purple:#8f4cff;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  overflow:hidden;
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 96% -4%,rgba(99,150,255,.12),transparent 26%),
    radial-gradient(circle at -4% 94%,rgba(21,140,255,.11),transparent 27%),
    linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);
  color:var(--text);
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 20px calc(24px + var(--safe-bottom));
}

body::before,
body::after{
  content:"";
  position:fixed;
  width:210px;
  height:210px;
  border-radius:999px;
  border:1px solid rgba(105,135,190,.08);
  pointer-events:none;
}

body::before{
  right:-64px;
  top:-56px;
  box-shadow:
    0 0 0 18px rgba(105,135,190,.035),
    0 0 0 38px rgba(105,135,190,.025),
    0 0 0 62px rgba(105,135,190,.018);
}

body::after{
  left:-80px;
  bottom:-64px;
  box-shadow:
    0 0 0 20px rgba(21,140,255,.035),
    0 0 0 44px rgba(21,140,255,.025),
    0 0 0 70px rgba(21,140,255,.014);
}

.loading-page{
  width:min(100%,390px);
  min-height:calc(100vh - 48px - var(--safe-bottom));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  z-index:2;
}

.iris-symbol{
  width:96px;
  height:96px;
  margin-bottom:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.iris-svg{
  width:96px;
  height:96px;
  display:block;
  overflow:visible;
  filter:drop-shadow(0 10px 24px rgba(45,132,255,.13));
}

.outer-ring{
  stroke:url(#irisStroke);
  stroke-width:3.8;
  fill:none;
  opacity:.96;
}

.inner-ticks{
  transform-origin:50px 50px;
  animation:irisSpin 14s linear infinite, irisBreathe 8s ease-in-out infinite;
}

.inner-ticks line{
  stroke:#4e9dff;
  stroke-width:2.25;
  stroke-linecap:round;
  opacity:.86;
}

.inner-ticks line:nth-child(3n){
  stroke:#6c7cff;
  opacity:.72;
}

.inner-ticks line:nth-child(4n){
  stroke:#8f4cff;
  opacity:.56;
}

@keyframes irisSpin{
  to{transform:rotate(360deg)}
}

@keyframes irisBreathe{
  0%,100%{scale:.94}
  50%{scale:1.06}
}

.wordmark{
  font-family:'Montserrat Alternates',sans-serif;
  font-size:2.28rem;
  line-height:1;
  letter-spacing:.43em;
  text-indent:.43em;
  font-weight:300;
  color:#1d2a3d;
  margin-bottom:18px;
}

.loading-text{
  color:#718097;
  font-size:.86rem;
  font-weight:600;
  margin-bottom:28px;
}

.loading-bar{
  width:min(260px,68vw);
  height:6px;
  border-radius:999px;
  background:rgba(210,220,235,.72);
  overflow:hidden;
  position:relative;
}

.loading-bar::before{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  left:-42%;
  width:42%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  animation:loadingMove 2.6s ease-in-out infinite;
}

@keyframes loadingMove{
  0%{left:-42%}
  100%{left:100%}
}

.percent{
  margin-top:14px;
  color:#718097;
  font-size:.76rem;
  font-weight:700;
}

.copy{
  position:fixed;
  left:50%;
  bottom:calc(24px + var(--safe-bottom));
  transform:translateX(-50%);
  color:#8d9ab0;
  font-size:.66rem;
  font-weight:650;
  white-space:nowrap;
}

@media(max-width:380px){
  .iris-symbol,
  .iris-svg{
    width:86px;
    height:86px;
  }

  .wordmark{
    font-size:2rem;
  }

  .loading-bar{
    width:min(240px,70vw);
  }
}
</style>
</head>

<body>

<main class="loading-page">

  <div class="iris-symbol" aria-hidden="true">
    <svg class="iris-svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="irisStroke" x1="18" y1="18" x2="82" y2="82" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#1498ff"/>
          <stop offset="58%" stop-color="#287dff"/>
          <stop offset="100%" stop-color="#8f4cff"/>
        </linearGradient>
      </defs>

      <circle class="outer-ring" cx="50" cy="50" r="35.5"/>

      <g class="inner-ticks">
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(0 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(15 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(30 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(45 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(60 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(75 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(90 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(105 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(120 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(135 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(150 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(165 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(180 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(195 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(210 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(225 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(240 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(255 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(270 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(285 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(300 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(315 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(330 50 50)"/>
        <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(345 50 50)"/>
      </g>
    </svg>
  </div>

  <div class="wordmark">IRIS</div>

  <div class="loading-text">Carregando o campo...</div>

  <div class="loading-bar" aria-hidden="true"></div>

  <div class="percent">72%</div>

</main>

<div class="copy">© 2026 IRIS. Todos os direitos reservados.</div>

</body>
</html>
