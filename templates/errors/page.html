<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IRIS — {{ title }}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon_iris.ico') }}" type="image/x-icon">
  <style>
    :root{--bg:#eef4fb;--text:#18263b;--muted:#6b7a90;--blue:#3f8edb;--red:#ea3d3d;--amber:#eea11b}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#f7faff,#eef4fb);color:var(--text)}
    .card{max-width:480px;width:100%;background:#fff;border:1px solid #d9e1ec;border-radius:22px;padding:32px 28px;box-shadow:0 16px 40px rgba(31,51,84,.08);text-align:center}
    .code{font-size:3rem;font-weight:900;line-height:1;color:var(--blue);margin:0 0 8px}
    .code.danger{color:var(--red)}
    .code.warn{color:var(--amber)}
    h1{margin:0 0 10px;font-size:1.25rem}
    p{margin:0 0 22px;color:var(--muted);line-height:1.55;font-size:.95rem}
    .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
    a.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border-radius:12px;text-decoration:none;font-weight:700;font-size:.9rem}
    a.primary{background:var(--blue);color:#fff}
    a.ghost{border:1px solid #d9e1ec;color:var(--text);background:#fff}
  </style>
</head>
<body>
  <div class="card">
    <p class="code {{ tone }}">{{ code }}</p>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <div class="actions">
      {% if back_url %}
      <a class="btn primary" href="{{ back_url }}">{{ back_label or 'Voltar ao início' }}</a>
      {% endif %}
      {% if show_login %}
      <a class="btn ghost" href="{{ url_for('login') }}">Fazer login</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
