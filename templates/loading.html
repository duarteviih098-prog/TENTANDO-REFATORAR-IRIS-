<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IRIS - Carregando</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat+Alternates:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --text:#1d2a3d;
  --muted:#718097;
  --blue:#158cff;
  --purple:#8f4cff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
  overflow:hidden;
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 96% -4%,rgba(99,150,255,.12),transparent 26%),
    radial-gradient(circle at -4% 94%,rgba(21,140,255,.11),transparent 27%),
    linear-gradient(180deg,#ffffff 0%,#fbfdff 100%);
  color:var(--text);
}

body::before,
body::after{
  content:"";
  position:fixed;
  width:420px;
  height:420px;
  border-radius:999px;
  border:1px solid rgba(105,135,190,.08);
  pointer-events:none;
}

body::before{
  right:-130px;
  top:-150px;
  box-shadow:
    0 0 0 38px rgba(105,135,190,.03),
    0 0 0 82px rgba(105,135,190,.02),
    0 0 0 128px rgba(105,135,190,.014);
}

body::after{
  left:-180px;
  bottom:-190px;
  box-shadow:
    0 0 0 38px rgba(21,140,255,.03),
    0 0 0 82px rgba(21,140,255,.02),
    0 0 0 128px rgba(21,140,255,.014);
}

.loading-page{
  width:100%;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px;
  position:relative;
  z-index:2;
}

.loading-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.iris-symbol{
  width:112px;
  height:112px;
  margin-bottom:22px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.iris-svg{
  width:112px;
  height:112px;
  overflow:visible;
  filter:drop-shadow(0 14px 30px rgba(45,132,255,.12));
}

.outer-ring{
  stroke:url(#irisStroke);
  stroke-width:3.8;
  fill:none;
  opacity:.96;
}

.inner-ticks{
  transform-origin:50px 50px;
  animation:irisSpin 15s linear infinite, irisBreathe 8s ease-in-out infinite;
}

.inner-ticks line{
  stroke:#4e9dff;
  stroke-width:2.25;
  stroke-linecap:round;
  opacity:.84;
}

.inner-ticks line:nth-child(3n){
  stroke:#6c7cff;
  opacity:.7;
}

.inner-ticks line:nth-child(4n){
  stroke:#8f4cff;
  opacity:.56;
}

@keyframes irisSpin{
  to{transform:rotate(360deg)}
}

@keyframes irisBreathe{
  0%,100%{scale:.94}
  50%{scale:1.06}
}

.wordmark{
  font-family:'Montserrat Alternates',sans-serif;
  font-size:3rem;
  line-height:1;
  letter-spacing:.34em;
  text-indent:.34em;
  font-weight:300;
  color:#1d2a3d;
  margin-bottom:18px;
}

.loading-text{
  font-family:'Montserrat Alternates',sans-serif;
  font-size:1rem;
  line-height:1.5;
  font-weight:400;
  color:#314158;
  opacity:.84;
  margin-bottom:28px;
}

.loading-bar{
  width:min(360px,72vw);
  height:7px;
  border-radius:999px;
  background:rgba(210,220,235,.72);
  overflow:hidden;
  position:relative;
}

.loading-bar::before{
  content:"";
  position:absolute;
  top:0;
  bottom:0;
  left:-42%;
  width:42%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  animation:loadingMove 2.6s ease-in-out infinite;
}

@keyframes loadingMove{
  0%{left:-42%}
  100%{left:100%}
}

.loading-foot{
  position:fixed;
  left:50%;
  bottom:26px;
  transform:translateX(-50%);
  color:#8d9ab0;
  font-size:.72rem;
  font-weight:600;
  white-space:nowrap;
}

@media(max-width:520px){
  .iris-symbol,
  .iris-svg{
    width:96px;
    height:96px;
  }

  .wordmark{
    font-size:2.25rem;
    letter-spacing:.42em;
    text-indent:.42em;
  }

  .loading-text{
    font-size:.9rem;
  }
}
</style>
</head>

<body>

<main class="loading-page">
  <section class="loading-box">

    <div class="iris-symbol" aria-hidden="true">
      <svg class="iris-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="irisStroke" x1="18" y1="18" x2="82" y2="82" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1498ff"/>
            <stop offset="58%" stop-color="#287dff"/>
            <stop offset="100%" stop-color="#8f4cff"/>
          </linearGradient>
        </defs>

        <circle class="outer-ring" cx="50" cy="50" r="35.5"/>

        <g class="inner-ticks">
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(0 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(15 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(30 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(45 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(60 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(75 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(90 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(105 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(120 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(135 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(150 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(165 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(180 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(195 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(210 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(225 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(240 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(255 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(270 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(285 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(300 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(315 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(330 50 50)"/>
          <line x1="50" y1="24.2" x2="50" y2="31.8" transform="rotate(345 50 50)"/>
        </g>
      </svg>
    </div>

    <div class="wordmark">IRIS</div>

    <div class="loading-text">Preparando sua experiência</div>

    <div class="loading-bar" aria-hidden="true"></div>

  </section>
</main>

<div class="loading-foot">© 2026 IRIS. Todos os direitos reservados.</div>

</body>
</html>
